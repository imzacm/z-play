<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Play</title>

    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 100vw;
            overflow-x: hidden;
            background-color: #f0f0f0;
        }

        .root {
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
            box-sizing: border-box;
            overflow: hidden;
            background-color: #000;
            width: 100%;
            height: 100%;
            /* Transitions removed; FLIP handles all smooth movement */
        }

        .container {
            flex: 1;
            min-height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
            position: relative;
        }

        .container img, .container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        button {
            width: 100%;
            flex-shrink: 0;
            cursor: pointer;
        }

        .nav {
            display: flex;
            flex-shrink: 0;
            height: auto;
        }

        .nav button {
            width: auto;
            height: 30px;
            flex: 1 1 0;
            font-size: 0.75rem;
            padding: 2px;
        }

        .loading {
            width: 0.8em;
            height: 0.8em;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3498db;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* --- CSS GRID CONTAINER --- */
        .players-container {
            display: grid;
            /* grid properties are assigned dynamically in JS based on mode */
            flex: 1;
            min-height: 0;
            width: 100%;
            overflow: hidden;
            padding: 2px;
            gap: 2px;
            box-sizing: border-box;
            align-content: start;
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
            gap: 10px;
            background-color: #fff;
        }

        .queue-header h3 {
            margin: 0;
            font-size: 0.9rem;
        }

        dialog {
            border: 1px solid #333;
            border-radius: 8px;
            padding: 0;
            background: #fff;
            max-width: 90vw;
            width: 320px;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.6);
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .modal-section {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin: 0;
        }

        .playback-controls label, .root-controls label {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 5px;
            gap: 10px;
            background: #f8f8f8;
            border-bottom: 1px solid #333;
            cursor: grab;
            touch-action: none;
            flex-shrink: 0;
        }

        .player-header:active {
            cursor: grabbing;
        }

        .playing-info {
            margin: 0 !important;
            font-size: 0.8rem;
            flex: 1;
            white-space: nowrap !important;
            overflow: hidden;
            min-width: 0;
        }

        .playing-info-content {
            display: inline-block;
            white-space: nowrap;
            transform-origin: left center;
        }

        .controls {
            margin: 0 !important;
            font-size: 0.8rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        h2 {
            margin: 0;
        }

        .progress-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #3498db;
            transition: width linear;
        }

        /* --- Fullscreen --- */
        html:fullscreen {
            background-color: #000;
        }

        html:fullscreen .queue-header,
        html:fullscreen .player-header,
        .root:fullscreen .player-header {
            display: none;
        }

        html:fullscreen .root,
        .root:fullscreen {
            border: none;
            background-color: #000;
        }

        .controls a {
            color: #000;
            text-decoration: none;
        }

        .controls a:hover {
            text-decoration: underline;
        }

        /* --- Drag and Resize --- */
        .root.is-dragging {
            opacity: 0.5;
            transform: scale(0.98);
            z-index: 100;
            border-color: #3498db;
        }

        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 30px;
            height: 30px;
            cursor: nwse-resize;
            z-index: 20;
            touch-action: none;
            background: linear-gradient(135deg, transparent 50%, rgba(255, 255, 255, 0.5) 50%);
        }

        .root:fullscreen .resize-handle {
            display: none;
        }
    </style>

    <script>
        const settingsManager = {
            fields: [
                '.filter-image', '.filter-video', '.filter-audio',
                '.layout-mode', '.layout-count',
                '.opt-autoplay', '.opt-autoskip', '.opt-loop',
                '.opt-img-duration-enabled', '.opt-img-duration'
            ],
            save() {
                const data = {};
                this.fields.forEach(selector => {
                    const el = document.querySelector(selector);
                    if (!el) return;
                    data[selector] = el.type === 'checkbox' ? el.checked : el.value;
                });
                localStorage.setItem('zplay_settings', JSON.stringify(data));
            },
            load() {
                const data = JSON.parse(localStorage.getItem('zplay_settings'));
                if (!data) return;
                Object.entries(data).forEach(([selector, value]) => {
                    const el = document.querySelector(selector);
                    if (!el) return;
                    if (el.type === 'checkbox') el.checked = value;
                    else el.value = value;
                    el.dispatchEvent(new Event('change'));
                    el.dispatchEvent(new Event('input'));
                });
            }
        }

        let playerCount = 0;
        let queueCountText, resetQueueButton, shuffleQueueButton, filterImage, filterVideo, filterAudio,
            playersContainer;
        let playerCountText, addPlayerButton, layoutMode, layoutCount;

        function addPlayer(saveToStorage = true) {
            const playerNumber = ++playerCount;
            if (saveToStorage) localStorage.setItem('zplay_player_count', playerCount.toString());

            const abortController = new AbortController();
            const image = document.createElement('img');
            const video = document.createElement('video');
            const audio = document.createElement('audio');

            let active = null;
            let loading = false;

            const root = document.createElement('div');
            root.classList.add('root');
            root.dataset.aspectRatio = "1";
            root.innerHTML = `
<div class="player-header">
    <h2 class="playing-info">
        <div class="playing-info-content">
            Playing <span class="playing-text"></span>
            <span class="loop-info" style="display: none; color: #888;">(Loop: <span class="loop-count">0</span>)</span>
            <span class="loading" aria-hidden="true" style="display: none;"></span>
        </div>
    </h2>
    <h2 class="controls"><a class="fullscreen-btn" href="#">Fullscreen</a><span class="remove-divider"> | </span><a class="remove" href="#">Remove player</a></h2>
</div>
<div class="container">
    <div class="progress-bar-container" style="display: none;"><div class="progress-bar-fill"></div></div>
</div>
<div class="nav">
    <button class="prev">Previous</button>
    <button class="toggle-play" style="display: none;">Pause</button>
    <button class="next">Next</button>
</div>`;

            const playingText = root.querySelector('.playing-text');
            const removeButton = root.querySelector('.remove');
            const fullscreenBtn = root.querySelector('.fullscreen-btn');
            const removeDivider = root.querySelector('.remove-divider');
            const container = root.querySelector('.container');
            const nextButton = root.querySelector('.next');
            const prevButton = root.querySelector('.prev');
            const loadingSpinner = root.querySelector('.loading');
            const loopInfo = root.querySelector('.loop-info');
            const loopCountText = root.querySelector('.loop-count');
            const progressBarContainer = root.querySelector('.progress-bar-container');
            const progressBarFill = root.querySelector('.progress-bar-fill');
            const playingInfo = root.querySelector('.playing-info');
            const playingInfoContent = root.querySelector('.playing-info-content');
            const togglePlayButton = root.querySelector('.toggle-play');

            let loopCount = 0;
            let imageTimeout = null;
            let imageStartTime = 0;
            let imageRemainingTime = 0;
            let isImagePaused = false;
            let videoProgressFrame = null;

            // Add resize handle
            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'resize-handle';
            root.appendChild(resizeHandle);

            const playerHeader = root.querySelector('.player-header');
            const resetLayoutBtn = document.querySelector('.reset-layout');

            // --- DRAG TO REORDER (GRID SAFE) ---
            let isDragging = false;
            let hasMoved = false;
            let dragStartX = 0, dragStartY = 0;

            playerHeader.addEventListener('pointerdown', (e) => {
                if (e.target.closest('a') || e.target.closest('button')) return;
                e.preventDefault();
                isDragging = true;
                hasMoved = false;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                playerHeader.setPointerCapture(e.pointerId);
            });

            playerHeader.addEventListener('pointermove', (e) => {
                if (!isDragging) return;

                if (!hasMoved) {
                    if (Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5) {
                        hasMoved = true;
                        root.classList.add('is-dragging');
                        container.style.pointerEvents = 'none'; // Stop media hijacking cursor
                    } else return;
                }

                root.style.visibility = 'hidden';
                const elementUnderCursor = document.elementFromPoint(e.clientX, e.clientY);
                root.style.visibility = '';

                if (!elementUnderCursor) return;
                const targetRoot = elementUnderCursor.closest('.root');

                if (targetRoot && targetRoot !== root) {
                    const allRoots = Array.from(playersContainer.children);
                    if (allRoots.indexOf(root) < allRoots.indexOf(targetRoot)) {
                        targetRoot.after(root);
                    } else {
                        targetRoot.before(root);
                    }
                    root.dataset.manualOverride = "true";
                    resetLayoutBtn.style.display = 'inline';
                    updateLayout(true);
                }
            });

            const endDrag = (e) => {
                if (!isDragging) return;
                isDragging = false;
                hasMoved = false;
                root.classList.remove('is-dragging');
                container.style.pointerEvents = '';
                playerHeader.releasePointerCapture(e.pointerId);
            };
            playerHeader.addEventListener('pointerup', endDrag);
            playerHeader.addEventListener('pointercancel', endDrag);

            // --- GRID SNAP RESIZING ---
            let isResizing = false;
            let resStartX, resStartY, startWidth, startHeight;
            let resizeFrame = null;

            resizeHandle.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                isResizing = true;
                resStartX = e.clientX;
                resStartY = e.clientY;

                const rect = root.getBoundingClientRect();
                startWidth = rect.width;
                startHeight = rect.height;

                container.style.pointerEvents = 'none';
                resizeHandle.setPointerCapture(e.pointerId);
            });

            resizeHandle.addEventListener('pointermove', (e) => {
                if (!isResizing) return;
                if (resizeFrame) cancelAnimationFrame(resizeFrame);

                resizeFrame = requestAnimationFrame(() => {
                    const CELL_SIZE = 10; // Must match the micro-grid size
                    const ratio = parseFloat(root.dataset.aspectRatio) || 1;

                    // 1. Calculate the new width based on where the mouse is dragged
                    let currentWidth = startWidth + (e.clientX - resStartX);

                    // 2. ASPECT LOCK: Force the height to exactly match the video's true ratio!
                    let currentHeight = currentWidth / ratio;

                    const containerRect = playersContainer.getBoundingClientRect();
                    const maxCols = Math.floor(containerRect.width / CELL_SIZE);

                    // 3. Convert to spans and cap the width so it doesn't break the screen
                    const colSpan = Math.max(15, Math.min(maxCols, Math.round(currentWidth / CELL_SIZE)));
                    const rowSpan = Math.max(15, Math.round(currentHeight / CELL_SIZE));

                    root.style.gridColumnEnd = `span ${colSpan}`;
                    root.style.gridRowEnd = `span ${rowSpan}`;

                    root.dataset.manualOverride = "true";
                    resetLayoutBtn.style.display = 'inline';
                });
            });

            const endResize = (e) => {
                if (!isResizing) return;
                isResizing = false;
                container.style.pointerEvents = '';
                resizeHandle.releasePointerCapture(e.pointerId);
                if (resizeFrame) cancelAnimationFrame(resizeFrame);
                updateLayout(true);
            };
            resizeHandle.addEventListener('pointerup', endResize);
            resizeHandle.addEventListener('pointercancel', endResize);

            // Text scaling
            const adjustTextScale = () => {
                playingInfoContent.style.transform = 'none';
                const containerWidth = playingInfo.clientWidth;
                const contentWidth = playingInfoContent.scrollWidth;
                if (contentWidth > containerWidth && containerWidth > 0) {
                    const scale = containerWidth / contentWidth;
                    playingInfoContent.style.transform = `scale(${scale})`;
                }
            };
            const textObserver = new ResizeObserver(() => adjustTextScale());
            textObserver.observe(playingInfo);

            if (playerCount === 1) {
                removeButton.style.display = 'none';
                removeDivider.style.display = 'none';
            }

            const setLoading = value => {
                loading = value;
                loadingSpinner.style.display = loading ? '' : 'none';
            };

            const removeEventListeners = () => {
                if (active === null) return;
                active.onerror = null;
                active.onload = null;
                if (active.tagName === 'VIDEO' || active.tagName === 'AUDIO') {
                    active.onended = null;
                    active.oncanplay = null;
                }
            };

            const updateAspectRatio = () => {
                if (active === null) return;
                let ratio = 1;
                if (active.tagName === 'IMG' && active.naturalHeight) {
                    ratio = active.naturalWidth / active.naturalHeight;
                } else if (active.tagName === 'VIDEO' && active.videoHeight) {
                    ratio = active.videoWidth / active.videoHeight;
                } else if (active.tagName === 'AUDIO') ratio = 3;

                root.dataset.aspectRatio = ratio.toString();
                updateLayout(true);
            };

            const startImageTimer = (isResuming = false) => {
                clearTimeout(imageTimeout);
                const isDurationEnabled = document.querySelector('.opt-img-duration-enabled').checked;
                const duration = parseInt(document.querySelector('.opt-img-duration').value);
                const isAutoSkip = document.querySelector('.opt-autoskip').checked;
                const isLoop = document.querySelector('.opt-loop').checked;

                if (!isDurationEnabled || isNaN(duration) || duration <= 0 || (!isAutoSkip && !isLoop)) {
                    togglePlayButton.style.display = 'none';
                    return;
                }

                togglePlayButton.style.display = '';
                togglePlayButton.innerText = 'Pause';
                progressBarContainer.style.display = 'block';
                isImagePaused = false;

                if (!isResuming) {
                    imageRemainingTime = duration * 1000;
                    progressBarFill.style.transition = 'none';
                    progressBarFill.style.width = '0%';
                }

                setTimeout(() => {
                    if (isImagePaused) return;
                    progressBarFill.style.transition = `width ${imageRemainingTime}ms linear`;
                    progressBarFill.style.width = '100%';
                }, 50);

                imageStartTime = Date.now();
                imageTimeout = setTimeout(() => onEnded(), imageRemainingTime);
            };

            const toggleImageTimer = () => {
                if (active !== image || !imageTimeout) return;
                if (isImagePaused) startImageTimer(true);
                else {
                    clearTimeout(imageTimeout);
                    imageRemainingTime -= (Date.now() - imageStartTime);
                    isImagePaused = true;
                    togglePlayButton.innerText = 'Play';
                    const computedWidth = parseFloat(window.getComputedStyle(progressBarFill).width);
                    const parentWidth = parseFloat(window.getComputedStyle(progressBarContainer).width);
                    progressBarFill.style.transition = 'none';
                    progressBarFill.style.width = `${(computedWidth / parentWidth) * 100}%`;
                }
            };

            root.pauseMedia = () => {
                if (active === image) {
                    if (!isImagePaused && imageTimeout) toggleImageTimer();
                } else if (active !== null) active.pause();
            };

            const stop = () => {
                if (active === null) return;
                removeEventListeners();
                clearTimeout(imageTimeout);
                if (videoProgressFrame) cancelAnimationFrame(videoProgressFrame);
                progressBarContainer.style.display = 'none';
                progressBarFill.style.width = '0%';
                if (active.tagName === 'VIDEO' || active.tagName === 'AUDIO') {
                    active.pause();
                    active.src = '';
                    active.load();
                }
                active.style.display = 'none';
                active = null;
            };

            const history = [];
            let historyIndex = -1;

            const loadFile = async (next = true) => {
                if (!next && (history.length === 0 || historyIndex === 0)) return;
                if (loading) return;
                setLoading(true);
                removeEventListeners();

                let response;
                if (next) {
                    if (history.length === 0 || historyIndex === history.length - 1) {
                        const query = new URLSearchParams();
                        if (filterImage.checked) query.append('kind', 'image');
                        if (filterVideo.checked) query.append('kind', 'video');
                        if (filterAudio.checked) query.append('kind', 'audio');
                        response = await fetch(`random?${query}`, {signal: abortController.signal}).then(response => {
                            setQueueCountFromResponse(response);
                            return response.json();
                        });
                        Object.freeze(response);
                        history.push(response);
                        historyIndex++;
                    } else {
                        historyIndex++;
                        response = history[historyIndex];
                    }
                } else {
                    historyIndex--;
                    response = history[historyIndex];
                }

                const path = response.path;
                const fileKind = response.kind;

                loopCount = 0;
                loopCountText.innerText = loopCount.toString();
                loopInfo.style.display = document.querySelector('.opt-loop').checked ? 'inline' : 'none';

                stop();

                switch (fileKind) {
                    case 'image':
                        active = image;
                        break;
                    case 'video':
                        active = video;
                        togglePlayButton.style.display = 'none';
                        break;
                    case 'audio':
                        active = audio;
                        togglePlayButton.style.display = 'none';
                        break;
                    default:
                        console.error(`Unsupported file kind: ${fileKind}`);
                        setLoading(false);
                        setTimeout(nextFile, 1);
                        return;
                }

                playingText.innerText = path;
                adjustTextScale();

                active.onerror = event => {
                    console.error('Error playing ' + playingText.innerText, event);
                    setLoading(false);
                    nextFile();
                };
                active.onload = () => {
                    active.style.display = '';
                    setLoading(false);
                    updateAspectRatio();
                    if (active === image) startImageTimer();
                };
                if (active.tagName === 'VIDEO' || active.tagName === 'AUDIO') {
                    active.onended = onEnded;
                    active.oncanplay = function () {
                        active.style.display = '';
                        setLoading(false);
                        updateAspectRatio();
                        if (active === video) {
                            progressBarContainer.style.display = 'block';
                            progressBarFill.style.transition = 'none';
                            progressBarFill.style.width = '0%';
                        }
                        if (document.querySelector('.opt-autoplay').checked) {
                            this.play().catch(error => console.warn("Autoplay blocked:", error));
                        }
                    };
                }

                active.src = path.startsWith('/') ? `files${path}` : `files/${path}`;
                loading = false;
            };

            const prevFile = () => loadFile(false);
            const nextFile = () => loadFile(true);

            const onEnded = () => {
                const isLoop = document.querySelector('.opt-loop').checked;
                const isAutoSkip = document.querySelector('.opt-autoskip').checked;
                if (isLoop) {
                    loopCount++;
                    loopCountText.innerText = loopCount.toString();
                    if (active === image) startImageTimer();
                    else {
                        active.currentTime = 0;
                        active.play().catch(error => console.warn("Autoplay blocked:", error));
                    }
                } else if (isAutoSkip) nextFile();
            };

            fullscreenBtn.addEventListener('click', event => {
                event.preventDefault();
                if (!document.fullscreenElement) root.requestFullscreen().catch(err => console.error(err));
                else document.exitFullscreen();
            });

            removeButton.addEventListener('click', event => {
                event.preventDefault();
                if (playerCount === 1) return;
                playerCount--;
                localStorage.setItem('zplay_player_count', playerCount.toString());
                abortController.abort('Player removed');
                textObserver.disconnect();
                stop();
                root.remove();
                playerCountText.innerText = playerCount.toString();

                if (playerCount === 1) {
                    document.querySelectorAll('.remove, .remove-divider').forEach(el => el.style.display = 'none');
                }
                updateLayout(true);
            });

            for (const element of [image, video, audio]) {
                element.style.display = 'none';
                if (element !== image) element.controls = true;
                container.appendChild(element);
            }

            prevButton.addEventListener('click', e => {
                e.preventDefault();
                prevFile();
            });
            nextButton.addEventListener('click', e => {
                e.preventDefault();
                nextFile();
            });
            togglePlayButton.addEventListener('click', e => {
                e.preventDefault();
                toggleImageTimer();
            });
            image.addEventListener('click', toggleImageTimer);
            image.style.cursor = 'pointer';

            const updateVideoProgress = () => {
                if (active !== video || !video.duration) return;
                progressBarFill.style.transition = 'none';
                progressBarFill.style.width = `${(video.currentTime / video.duration) * 100}%`;
                if (!video.paused && !video.ended) videoProgressFrame = requestAnimationFrame(updateVideoProgress);
            };

            video.addEventListener('play', () => {
                progressBarContainer.style.display = 'block';
                if (videoProgressFrame) cancelAnimationFrame(videoProgressFrame);
                videoProgressFrame = requestAnimationFrame(updateVideoProgress);
            });
            video.addEventListener('pause', () => {
                if (videoProgressFrame) cancelAnimationFrame(videoProgressFrame);
            });
            video.addEventListener('seeked', () => {
                if (active === video && video.paused && video.duration) {
                    progressBarFill.style.width = `${(video.currentTime / video.duration) * 100}%`;
                }
            });

            playersContainer.appendChild(root);
            nextFile();
            playerCountText.innerText = playerCount.toString();

            if (playerCount > 1) {
                document.querySelectorAll('.remove').forEach(el => el.style.display = '');
                document.querySelectorAll('.remove-divider').forEach(el => el.style.display = 'inline');
            }

            updateLayout(true);
        }

        function setQueueCountFromResponse(response) {
            const queueCount = response.headers.get('x-queue-count');
            const videoCount = response.headers.get('x-queue-video-count');
            const imageCount = response.headers.get('x-queue-image-count');
            const audioCount = response.headers.get('x-queue-audio-count');
            queueCountText.innerText = `${queueCount} - ${videoCount} videos, ${imageCount} images, ${audioCount} audio`;
        }

        async function getQueueInfo() {
            const response = await fetch('queue');
            setQueueCountFromResponse(response);
        }

        let queueInfoTimeout = null;

        function getQueueInfoPoll(timeout = 1) {
            if (queueInfoTimeout !== null) return;
            queueInfoTimeout = setTimeout(() => {
                getQueueInfo().catch(e => console.warn(e)).then(() => {
                    queueInfoTimeout = null;
                    getQueueInfoPoll(500);
                });
            }, timeout);
        }

        // --- THE NEW CSS GRID LAYOUT ENGINE ---
        function updateLayout(animate = true) {
            const shouldAnimate = animate === true;
            const mode = layoutMode.value;
            layoutCount.disabled = mode === 'fluid';
            let count = parseInt(layoutCount.value) || 1;
            const domPlayers = Array.from(document.querySelectorAll('.root'));
            const N = domPlayers.length;
            count = Math.min(count, N) || 1;

            if (N === 0) return;

            // 1. Record FLIP Initial state
            let firstRects;
            if (shouldAnimate) {
                firstRects = new Map();
                domPlayers.forEach(p => firstRects.set(p, p.getBoundingClientRect()));
            }

            // 2. Setup Container Constraints
            playersContainer.style.display = 'grid';

            if (mode === 'horizontal') {
                // Columns Mode
                playersContainer.style.gridTemplateColumns = `repeat(${count}, 1fr)`;
                playersContainer.style.gridAutoRows = `calc(100% / ${Math.ceil(N / count)})`;
                playersContainer.style.gridAutoFlow = 'row dense';

                playersContainer.dataset.cols = count;
                playersContainer.dataset.rowHeight = playersContainer.clientHeight / Math.ceil(N / count);

                domPlayers.forEach(p => {
                    if (p.dataset.manualOverride === "true") return;
                    p.style.gridColumnEnd = 'span 1';
                    p.style.gridRowEnd = 'span 1';
                });

            } else if (mode === 'vertical') {
                // Rows Mode
                const rowCount = count;
                const dynamicCols = Math.ceil(N / rowCount);
                playersContainer.style.gridTemplateColumns = `repeat(${dynamicCols}, 1fr)`;
                playersContainer.style.gridAutoRows = `calc(100% / ${rowCount})`;
                playersContainer.style.gridAutoFlow = 'column dense'; // Fill column by column

                playersContainer.dataset.cols = dynamicCols;
                playersContainer.dataset.rowHeight = playersContainer.clientHeight / rowCount;

                domPlayers.forEach(p => {
                    if (p.dataset.manualOverride === "true") return;
                    p.style.gridColumnEnd = 'span 1';
                    p.style.gridRowEnd = 'span 1';
                });

            } else if (mode === 'fluid') {
                const CELL_SIZE = 10; // The 10px micro-grid for high-fidelity aspect ratios

                playersContainer.style.gridTemplateColumns = `repeat(auto-fill, ${CELL_SIZE}px)`;
                playersContainer.style.gridTemplateRows = '';
                playersContainer.style.gridAutoRows = `${CELL_SIZE}px`;
                playersContainer.style.gridAutoFlow = 'row dense';
                playersContainer.style.justifyContent = 'center';
                playersContainer.style.alignContent = 'center'; // Centers the final cluster beautifully

                const containerW = playersContainer.clientWidth || window.innerWidth;
                const containerH = playersContainer.clientHeight || window.innerHeight;
                const maxCols = Math.floor(containerW / CELL_SIZE);

                // --- Binary Search for the Perfect Scale ---
                let minS = 10;
                let maxS = Math.max(containerW, containerH);
                let bestS = minS;

                // 8 iterations is the perfect balance: it takes <5ms and finds the exact pixel boundary
                for (let i = 0; i < 8; i++) {
                    let midS = (minS + maxS) / 2;

                    domPlayers.forEach(p => {
                        if (p.dataset.manualOverride === "true") return;

                        const ratio = parseFloat(p.dataset.aspectRatio) || 1;

                        // Scale the size while perfectly locking the aspect ratio!
                        let w = midS * Math.sqrt(ratio);
                        let h = midS / Math.sqrt(ratio);

                        let cSpan = Math.max(15, Math.round(w / CELL_SIZE));
                        let rSpan = Math.max(15, Math.round(h / CELL_SIZE));

                        cSpan = Math.min(cSpan, maxCols);

                        p.style.gridColumnEnd = `span ${cSpan}`;
                        p.style.gridRowEnd = `span ${rSpan}`;
                    });

                    // Force the browser to calculate the physical layout
                    void playersContainer.offsetWidth;

                    // Check if the current size causes a vertical overflow
                    // (Adding a 5px buffer to prevent edge-case scrollbars)
                    if (playersContainer.scrollHeight <= containerH + 5) {
                        bestS = midS; // This size fits! Save it.
                        minS = midS;  // Let's try to make them even bigger!
                    } else {
                        maxS = midS;  // Too big, went off screen. Scale back down.
                    }
                }

                // Apply the absolute optimal size we found
                domPlayers.forEach(p => {
                    if (p.dataset.manualOverride === "true") return;

                    const ratio = parseFloat(p.dataset.aspectRatio) || 1;
                    let w = bestS * Math.sqrt(ratio);
                    let h = bestS / Math.sqrt(ratio);

                    let cSpan = Math.max(15, Math.round(w / CELL_SIZE));
                    let rSpan = Math.max(15, Math.round(h / CELL_SIZE));
                    cSpan = Math.min(cSpan, maxCols);

                    p.style.gridColumnEnd = `span ${cSpan}`;
                    p.style.gridRowEnd = `span ${rSpan}`;
                });
            }

            // 3. FLIP Animate to new Grid Positions
            if (shouldAnimate) {
                // Force a layout recalculation
                void playersContainer.offsetWidth;

                domPlayers.forEach(p => {
                    const first = firstRects.get(p);
                    const last = p.getBoundingClientRect();

                    const deltaX = first.left - last.left;
                    const deltaY = first.top - last.top;
                    const deltaW = first.width / (last.width || 1);
                    const deltaH = first.height / (last.height || 1);

                    if (deltaX !== 0 || deltaY !== 0 || deltaW !== 1 || deltaH !== 1) {
                        p.animate([
                            {
                                transformOrigin: 'top left',
                                transform: `translate(${deltaX}px, ${deltaY}px) scale(${deltaW}, ${deltaH})`
                            },
                            {transformOrigin: 'top left', transform: 'none'}
                        ], {
                            duration: 350,
                            easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)'
                        });
                    }
                });
            }
        }

        const patchRootsBody = [];
        let patchRootsTimeout = null;

        const rootCheckboxChanged = checkbox => {
            if (!checkbox.id.startsWith('root-')) return;
            const root = checkbox.id.substring(5);
            patchRootsBody.push({path: root, enabled: checkbox.checked});

            if (patchRootsTimeout === null) {
                patchRootsTimeout = setTimeout(() => {
                    patchRootsTimeout = null;
                    fetch('roots', {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(patchRootsBody.splice(0))
                    })
                        .then(response => setQueueCountFromResponse(response))
                        .catch(error => console.error('Error updating roots:', error));
                }, 100);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            settingsManager.load();
            document.getElementById('options-modal').addEventListener('change', event => {
                const target = event.originalTarget || event.target;
                if (target.type === 'checkbox' && target.id.startsWith('root-')) {
                    rootCheckboxChanged(target);
                    return;
                }
                settingsManager.save();
            });

            queueCountText = document.querySelector('.queue-count');
            resetQueueButton = document.querySelector('.reset-queue');
            shuffleQueueButton = document.querySelector('.shuffle-queue');
            filterImage = document.querySelector('.filter-image');
            filterVideo = document.querySelector('.filter-video');
            filterAudio = document.querySelector('.filter-audio');
            playersContainer = document.querySelector('.players-container');
            playerCountText = document.querySelector('.player-count');
            addPlayerButton = document.querySelector('.add-player');
            layoutMode = document.querySelector('.layout-mode');
            layoutCount = document.querySelector('.layout-count');

            resetQueueButton.addEventListener('click', e => {
                e.preventDefault();
                fetch('reset').then(getQueueInfo);
            });
            shuffleQueueButton.addEventListener('click', e => {
                e.preventDefault();
                fetch('shuffle').then(getQueueInfo);
            });
            addPlayerButton.addEventListener('click', e => {
                e.preventDefault();
                addPlayer();
            });

            layoutMode.addEventListener('change', () => updateLayout(true));
            layoutCount.addEventListener('input', () => updateLayout(true));
            window.addEventListener('resize', () => updateLayout(false));

            const storagePlayerCount = Number(localStorage.getItem('zplay_player_count') || 0) || 1;
            for (let i = 0; i < storagePlayerCount; i++) addPlayer(false);
            getQueueInfoPoll();

            document.querySelector('.fullscreen-all-btn').addEventListener('click', e => {
                e.preventDefault();
                if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => console.error(err));
                else document.exitFullscreen();
            });

            document.addEventListener('fullscreenchange', () => {
                const fsElement = document.fullscreenElement;
                if (fsElement && fsElement.classList.contains('root')) {
                    document.querySelectorAll('.root').forEach(r => {
                        if (r !== fsElement && typeof r.pauseMedia === 'function') r.pauseMedia();
                    });
                }
            });

            const modal = document.getElementById('options-modal');
            document.querySelector('.options-btn').addEventListener('click', async () => {
                try {
                    const roots = await fetch('roots').then(response => {
                        setQueueCountFromResponse(response);
                        return response.json();
                    });
                    const root = document.querySelector('.root-controls');
                    root.innerHTML = '';
                    const elements = [];
                    for (const {path, enabled} of roots) {
                        const div = document.createElement('div');
                        div.innerHTML = `<label><input id="root-${path}" type="checkbox" ${enabled ? 'checked' : ''}> ${path}</label>`;
                        const element = div.firstElementChild;
                        element.onchange = rootCheckboxChanged.bind(null, element);
                        elements.push(element);
                    }
                    elements.sort((a, b) => a.innerText.localeCompare(b.innerText));
                    for (const element of elements) root.appendChild(element);
                } catch (error) {
                    console.error('Error fetching roots:', error);
                }
                modal.showModal();
            });
            document.querySelector('.close-modal').addEventListener('click', () => modal.close());

            const autoSkipCheck = document.querySelector('.opt-autoskip');
            const loopCheck = document.querySelector('.opt-loop');
            autoSkipCheck.addEventListener('change', e => {
                if (e.target.checked) loopCheck.checked = false;
            });
            loopCheck.addEventListener('change', e => {
                if (e.target.checked) autoSkipCheck.checked = false;
                document.querySelectorAll('.loop-info').forEach(el => el.style.display = e.target.checked ? 'inline' : 'none');
            });

            const imgDurationCheck = document.querySelector('.opt-img-duration-enabled');
            const imgDurationInput = document.querySelector('.opt-img-duration');
            imgDurationCheck.addEventListener('change', e => imgDurationInput.disabled = !e.target.checked);

            document.querySelector('.select-all-roots').addEventListener('click', e => {
                e.preventDefault();
                document.querySelectorAll('.root-controls input[type="checkbox"]').forEach(el => {
                    el.checked = true;
                    rootCheckboxChanged(el);
                });
            });
            document.querySelector('.deselect-all-roots').addEventListener('click', e => {
                e.preventDefault();
                document.querySelectorAll('.root-controls input[type="checkbox"]').forEach(el => {
                    el.checked = false;
                    rootCheckboxChanged(el);
                });
            });

            const resetLayoutBtn = document.querySelector('.reset-layout');
            resetLayoutBtn.addEventListener('click', (event) => {
                event.preventDefault();
                document.querySelectorAll('.root').forEach(root => {
                    root.dataset.manualOverride = "false";
                    root.style.gridColumnEnd = '';
                    root.style.gridRowEnd = '';
                });
                resetLayoutBtn.style.display = 'none';
                updateLayout(true);
            });
        });
    </script>
</head>
<body>
<div class="queue-header">
    <h3>Queue (<span class="queue-count"></span>) <a class="reset-queue" href="#">Reset queue</a> <a
            class="shuffle-queue" href="#">Shuffle queue</a></h3>
    <div>
        <button class="options-btn" style="width: auto; height: auto; padding: 5px 15px;">Options</button>
        <button class="fullscreen-all-btn" style="width: auto; height: auto; padding: 5px 15px;">Fullscreen All</button>
    </div>
    <h3>Players (<span class="player-count"></span>)
        <a class="add-player" href="#">Add Player</a> |
        <a class="reset-layout" href="#" style="display: none;">Reset Layout</a>
    </h3>
</div>

<dialog id="options-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin: 0; font-size: 1.2rem;">Options</h2>
            <button class="close-modal" style="width: auto; height: auto; padding: 5px 10px;">Close</button>
        </div>

        <fieldset class="modal-section">
            <legend>Filters</legend>
            <div class="filters">
                <label><input type="checkbox" class="filter-image" checked> Image</label>
                <label><input type="checkbox" class="filter-video" checked> Video</label>
                <label><input type="checkbox" class="filter-audio" checked> Audio</label>
            </div>
        </fieldset>

        <fieldset class="modal-section">
            <legend>Layout</legend>
            <div class="layout-controls">
                <label>Mode:
                    <select class="layout-mode">
                        <option value="horizontal">Columns</option>
                        <option value="vertical">Rows</option>
                        <option value="fluid">Fluid</option>
                    </select>
                </label>
                <label>Count: <input type="number" class="layout-count" value="3" min="1" max="10" style="width: 40px;"></label>
            </div>
        </fieldset>

        <fieldset class="modal-section">
            <legend>Playback</legend>
            <div class="playback-controls">
                <label><input type="checkbox" class="opt-autoplay" checked> Auto play</label>
                <label><input type="checkbox" class="opt-autoskip" checked> Auto skip</label>
                <label><input type="checkbox" class="opt-loop"> Loop</label>

                <div style="margin-top: 15px;">
                    <label style="margin-bottom: 5px;">
                        <input type="checkbox" class="opt-img-duration-enabled" checked> Auto-skip images after (s):
                    </label>
                    <input type="number" class="opt-img-duration" value="5" min="1"
                           style="width: 60px; margin-left: 24px;">
                </div>
            </div>
        </fieldset>

        <fieldset class="modal-section">
            <legend>Roots</legend>
            <a class="select-all-roots" href="#">Select All</a>
            <a class="deselect-all-roots" href="#">Deselect All</a>
            <div class="root-controls"></div>
        </fieldset>
    </div>
</dialog>

<div class="players-container"></div>
</body>
</html>
