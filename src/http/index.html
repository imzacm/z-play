<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Play</title>

    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column; /* Stacks the header and the player container vertically */
            height: 100dvh;
            max-width: 100vw;
            overflow-x: hidden;
        }

        .root {
            flex: 1 1 auto; /* Default: grow to fill space */
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
            width: auto;
            border: 1px solid #333;
            box-sizing: border-box;
            overflow: hidden;
            /* Transition removed here: FLIP animation now handles layout smoothly */
        }

        .container {
            flex: 1;
            min-height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
        }

        .container img, .container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        button {
            height: 10%;
            width: 100%;
            flex-shrink: 0;
            cursor: pointer;
        }

        .nav {
            display: flex;
            flex-shrink: 0;
            height: 5%;
        }

        .nav button {
            width: auto;
            height: 100%;
            flex: 1 1 0;
            font-size: 0.75rem;
            padding: 2px;
        }

        .loading {
            width: 0.8em;
            height: 0.8em;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3498db; /* The accent color */
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .players-container {
            display: flex;
            flex-wrap: wrap;
            align-content: stretch; /* Ensures items fill vertical space if wrapped */
            flex: 1;
            min-height: 0;
            width: 100%;
            overflow: hidden;
        }

        /* Clean header layout */
        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
            gap: 10px;
        }

        .queue-header h3 {
            margin: 0;
            font-size: 0.9rem;
        }

        /* Native Dialog Styling */
        dialog {
            border: 1px solid #333;
            border-radius: 8px;
            padding: 0;
            background: #fff;
            max-width: 90vw;
            width: 320px;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.6); /* Darkens the background */
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .modal-section {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin: 0;
        }

        .playback-controls label, .root-controls label {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        /* Container for the top labels */
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start; /* Aligns items to the top */
            padding: 5px;
            gap: 10px;
            background: #f8f8f8; /* Optional: adds a slight definition to the header */
            border-bottom: 1px solid #333;
        }

        .playing-info {
            margin: 0 !important;
            font-size: 0.8rem;
            flex: 1; /* Takes up remaining space */
            white-space: nowrap !important;
            overflow: hidden;
            min-width: 0;
            /*word-break: break-all; !* Ensures long file paths don't break layout *!*/
        }

        .playing-info-content {
            display: inline-block;
            white-space: nowrap;
            transform-origin: left center; /* Ensures it shrinks toward the left */
        }

        .controls {
            margin: 0 !important;
            font-size: 0.8rem;
            white-space: nowrap; /* Keeps "Remove player" on one line */
            flex-shrink: 0; /* Prevents the button from being squished */
        }

        h2 {
            margin: 0;
        }

        .progress-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #3498db;
            /* Using linear timing for a steady countdown feel */
            transition: width linear;
        }

        /* Ensure the container is positioned relatively so the bar stays inside */
        .container {
            position: relative;
        }

        /* --- Fullscreen Features --- */
        html:fullscreen {
            background-color: #000;
        }

        html:fullscreen .queue-header,
        html:fullscreen .player-header,
        .root:fullscreen .player-header {
            display: none;
        }

        html:fullscreen .root,
        .root:fullscreen {
            border: none;
            background-color: #000;
        }

        .controls a {
            color: #000;
            text-decoration: none;
        }

        .controls a:hover {
            text-decoration: underline;
        }
    </style>

    <script>
        const settingsManager = {
            // Selectors for all the inputs we want to save
            fields: [
                '.filter-image', '.filter-video', '.filter-audio',
                '.layout-mode', '.layout-count',
                '.opt-autoplay', '.opt-autoskip', '.opt-loop',
                '.opt-img-duration-enabled', '.opt-img-duration'
            ],

            save() {
                const data = {};
                this.fields.forEach(selector => {
                    const el = document.querySelector(selector);
                    if (!el) return;
                    // Store checked state for checkboxes, value for everything else
                    data[selector] = el.type === 'checkbox' ? el.checked : el.value;
                });
                localStorage.setItem('zplay_settings', JSON.stringify(data));
            },

            load() {
                const data = JSON.parse(localStorage.getItem('zplay_settings'));
                if (!data) return;

                Object.entries(data).forEach(([selector, value]) => {
                    const el = document.querySelector(selector);
                    if (!el) return;

                    if (el.type === 'checkbox') {
                        el.checked = value;
                    } else {
                        el.value = value;
                    }
                    // Manually trigger change events so your UI logic (like disabling inputs) runs
                    el.dispatchEvent(new Event('change'));
                    el.dispatchEvent(new Event('input'));
                });
            }
        }

        let playerCount = 0

        let queueCountText
        let resetQueueButton
        let shuffleQueueButton
        let filterImage
        let filterVideo
        let filterAudio
        let playersContainer

        let playerCountText
        let addPlayerButton

        let layoutMode
        let layoutCount

        function addPlayer(saveToStorage = true) {
            const playerNumber = ++playerCount

            if (saveToStorage) {
                localStorage.setItem('zplay_player_count', playerCount.toString())
            }

            const abortController = new AbortController()

            const image = document.createElement('img')
            const video = document.createElement('video')
            const audio = document.createElement('audio')

            let active = null
            let loading = false

            const root = document.createElement('div')
            root.classList.add('root')
            root.dataset.aspectRatio = "1"
            root.innerHTML = `
<div class="player-header">
    <h2 class="playing-info">
        <div class="playing-info-content">
            Playing <span class="playing-text"></span>
            <span class="loop-info" style="display: none; color: #888;">(Loop: <span class="loop-count">0</span>)</span>
            <span class="loading" aria-hidden="true" style="display: none;"></span>
        </div>
    </h2>
    <h2 class="controls"><a class="fullscreen-btn" href="#">Fullscreen</a><span class="remove-divider"> | </span><a class="remove" href="#">Remove player</a></h2>
</div>
<div class="container">
    <div class="progress-bar-container" style="display: none;">
        <div class="progress-bar-fill"></div>
    </div>
</div>
<div class="nav">
    <button class="prev">Previous</button>
    <button class="toggle-play" style="display: none;">Pause</button>
    <button class="next">Next</button>
</div>`

            const playingText = root.querySelector('.playing-text')
            const removeButton = root.querySelector('.remove')
            const fullscreenBtn = root.querySelector('.fullscreen-btn')
            const removeDivider = root.querySelector('.remove-divider')
            const container = root.querySelector('.container')
            const nextButton = root.querySelector('.next')
            const prevButton = root.querySelector('.prev')
            const loadingSpinner = root.querySelector('.loading')

            const loopInfo = root.querySelector('.loop-info')
            const loopCountText = root.querySelector('.loop-count')
            let loopCount = 0
            let imageTimeout = null

            const progressBarContainer = root.querySelector('.progress-bar-container')
            const progressBarFill = root.querySelector('.progress-bar-fill')

            const playingInfo = root.querySelector('.playing-info')
            const playingInfoContent = root.querySelector('.playing-info-content')

            const togglePlayButton = root.querySelector('.toggle-play')
            let imageStartTime = 0
            let imageRemainingTime = 0
            let isImagePaused = false

            let videoProgressFrame = null;

            // Calculates and applies the exact scale needed to fit the text
            const adjustTextScale = () => {
                // Reset transform temporarily so we can measure the true width
                playingInfoContent.style.transform = 'none'

                const containerWidth = playingInfo.clientWidth
                const contentWidth = playingInfoContent.scrollWidth

                if (contentWidth > containerWidth && containerWidth > 0) {
                    const scale = containerWidth / contentWidth
                    playingInfoContent.style.transform = `scale(${scale})`
                }
            }

            // Automatically triggers the scale adjustment if the layout changes size
            const textObserver = new ResizeObserver(() => adjustTextScale())
            textObserver.observe(playingInfo)

            if (playerCount === 1) {
                removeButton.style.display = 'none'
                removeDivider.style.display = 'none'
            }

            const setLoading = value => {
                loading = value
                loadingSpinner.style.display = loading ? '' : 'none'
            }

            const removeEventListeners = () => {
                if (active === null) {
                    return
                }

                active.onerror = null
                active.onload = null
                if (active.tagName === 'VIDEO' || active.tagName === 'AUDIO') {
                    active.onended = null
                    active.oncanplay = null
                }
            }

            const updateAspectRatio = () => {
                if (active === null) {
                    return
                }

                let ratio = 1
                if (active.tagName === 'IMG' && active.naturalHeight) {
                    ratio = active.naturalWidth / active.naturalHeight
                } else if (active.tagName === 'VIDEO' && active.videoHeight) {
                    ratio = active.videoWidth / active.videoHeight
                } else if (active.tagName === 'AUDIO') {
                    ratio = 3
                }

                root.dataset.aspectRatio = ratio.toString()
                updateLayout(true) // Animate when natural ratio changes
            }

            const startImageTimer = (isResuming = false) => {
                clearTimeout(imageTimeout)

                const isDurationEnabled = document.querySelector('.opt-img-duration-enabled').checked
                const duration = parseInt(document.querySelector('.opt-img-duration').value)
                const isAutoSkip = document.querySelector('.opt-autoskip').checked
                const isLoop = document.querySelector('.opt-loop').checked

                // If timer shouldn't run, ensure button is hidden
                if (!isDurationEnabled || isNaN(duration) || duration <= 0 || (!isAutoSkip && !isLoop)) {
                    togglePlayButton.style.display = 'none'
                    return
                }

                togglePlayButton.style.display = ''
                togglePlayButton.innerText = 'Pause'
                progressBarContainer.style.display = 'block'
                isImagePaused = false

                if (!isResuming) {
                    imageRemainingTime = duration * 1000
                    progressBarFill.style.transition = 'none'
                    progressBarFill.style.width = '0%'
                }

                setTimeout(() => {
                    if (isImagePaused) return // Catch edge case if paused instantly
                    progressBarFill.style.transition = `width ${imageRemainingTime}ms linear`
                    progressBarFill.style.width = '100%'
                }, 50)

                imageStartTime = Date.now()
                imageTimeout = setTimeout(() => {
                    onEnded()
                }, imageRemainingTime)
            }

            const toggleImageTimer = () => {
                if (active !== image || !imageTimeout) return

                if (isImagePaused) {
                    // Resume
                    startImageTimer(true)
                } else {
                    // Pause
                    clearTimeout(imageTimeout)
                    const elapsed = Date.now() - imageStartTime
                    imageRemainingTime -= elapsed
                    isImagePaused = true
                    togglePlayButton.innerText = 'Play'

                    // Freeze the progress bar exactly where it is
                    const computedWidth = parseFloat(window.getComputedStyle(progressBarFill).width)
                    const parentWidth = parseFloat(window.getComputedStyle(progressBarContainer).width)
                    progressBarFill.style.transition = 'none'
                    progressBarFill.style.width = `${(computedWidth / parentWidth) * 100}%`
                }
            }

            // Allow programmatic pausing from outside the player
            root.pauseMedia = () => {
                if (active === image) {
                    if (!isImagePaused && imageTimeout) toggleImageTimer()
                } else if (active !== null) {
                    active.pause()
                }
            }

            const stop = () => {
                if (active === null) {
                    return
                }
                removeEventListeners()
                clearTimeout(imageTimeout)
                if (videoProgressFrame) {
                    cancelAnimationFrame(videoProgressFrame)
                }

                // Hide progress bar on stop/switch
                progressBarContainer.style.display = 'none'
                progressBarFill.style.width = '0%'

                if (active.tagName === 'VIDEO' || active.tagName === 'AUDIO') {
                    active.pause()
                    active.src = ''
                    active.load()
                }
                active.style.display = 'none'
                active = null
            }

            const history = []
            let historyIndex = -1

            const loadFile = async (next = true) => {
                if (!next && (history.length === 0 || historyIndex === 0)) {
                    return
                }

                if (loading) {
                    return
                }
                setLoading(true)

                removeEventListeners()

                let response
                if (next) {
                    if (history.length === 0 || historyIndex === history.length - 1) {
                        const query = new URLSearchParams()
                        if (filterImage.checked) {
                            query.append('kind', 'image')
                        }
                        if (filterVideo.checked) {
                            query.append('kind', 'video')
                        }
                        if (filterAudio.checked) {
                            query.append('kind', 'audio')
                        }
                        response = await fetch(`random?${query}`, {signal: abortController.signal}).then(response => {
                            setQueueCountFromResponse(response)
                            return response.json()
                        })
                        Object.freeze(response)
                        history.push(response)
                        historyIndex++
                    } else {
                        historyIndex++
                        response = history[historyIndex]
                    }
                } else {
                    historyIndex--
                    response = history[historyIndex]
                }

                console.log(response)

                const path = response.path
                const fileKind = response.kind

                // Reset loop tracking on new file
                loopCount = 0
                loopCountText.innerText = loopCount.toString()
                loopInfo.style.display = document.querySelector('.opt-loop').checked ? 'inline' : 'none'

                stop()

                switch (fileKind) {
                    case 'image':
                        active = image
                        break
                    case 'video':
                        active = video
                        togglePlayButton.style.display = 'none'
                        break
                    case 'audio':
                        active = audio
                        togglePlayButton.style.display = 'none'
                        break
                    default:
                        console.error(`Unsupported file kind: ${fileKind}`)
                        setLoading(false)
                        setTimeout(nextFile, 1)
                        return
                }

                playingText.innerText = path
                adjustTextScale()

                active.onerror = onError
                active.onload = onLoad
                if (active.tagName === 'VIDEO' || active.tagName === 'AUDIO') {
                    active.onended = onEnded
                    active.oncanplay = onCanPlay
                }

                if (path.startsWith('/')) {
                    active.src = `files${path}`
                } else {
                    active.src = `files/${path}`
                }

                loading = false
            }

            const prevFile = () => loadFile(false)
            const nextFile = () => loadFile(true)

            function onCanPlay() {
                active.style.display = ''
                setLoading(false)
                updateAspectRatio()

                if (active === video) {
                    progressBarContainer.style.display = 'block'
                    progressBarFill.style.transition = 'none' // Snap to 0 instantly
                    progressBarFill.style.width = '0%'
                }

                if (document.querySelector('.opt-autoplay').checked) {
                    this.play().catch(error => console.warn("Autoplay blocked:", error))
                }
            }

            const onError = event => {
                console.error('Error playing ' + playingText.innerText, event)
                setLoading(false)
                nextFile()
            }

            const onLoad = () => {
                active.style.display = ''
                setLoading(false)
                updateAspectRatio()
                if (active === image) {
                    startImageTimer()
                }
            }

            const onEnded = () => {
                const isLoop = document.querySelector('.opt-loop').checked
                const isAutoSkip = document.querySelector('.opt-autoskip').checked

                if (isLoop) {
                    loopCount++
                    loopCountText.innerText = loopCount.toString()

                    if (active === image) {
                        startImageTimer() // Restart the countdown
                    } else {
                        active.currentTime = 0
                        active.play().catch(error => console.warn("Autoplay blocked:", error))
                    }
                } else if (isAutoSkip) {
                    nextFile()
                }
            }

            fullscreenBtn.addEventListener('click', event => {
                event.preventDefault()
                if (!document.fullscreenElement) {
                    root.requestFullscreen().catch(err => console.error(err))
                } else {
                    document.exitFullscreen()
                }
            })

            removeButton.addEventListener('click', event => {
                event.preventDefault()
                if (playerCount === 1) {
                    return
                }
                playerCount--

                localStorage.setItem('zplay_player_count', playerCount.toString())

                abortController.abort('Player removed')
                textObserver.disconnect()
                stop()
                root.remove()

                playerCountText.innerText = playerCount.toString()

                if (playerCount === 1) {
                    for (const element of document.querySelectorAll('.remove')) {
                        element.style.display = 'none'
                    }
                    for (const element of document.querySelectorAll('.remove-divider')) {
                        element.style.display = 'none'
                    }
                }

                updateLayout(true) // Animate gracefully when a player disappears
            })

            for (const element of [image, video, audio]) {
                element.style.display = 'none'
                if (element !== image) {
                    element.controls = true
                }
                container.appendChild(element)
            }

            prevButton.addEventListener('click', event => {
                event.preventDefault()
                prevFile()
            })
            nextButton.addEventListener('click', event => {
                event.preventDefault()
                nextFile()
            })

            togglePlayButton.addEventListener('click', event => {
                event.preventDefault()
                toggleImageTimer()
            })

            // Allow clicking the image itself to pause/play
            image.addEventListener('click', toggleImageTimer)
            image.style.cursor = 'pointer'

            // The smooth animation loop
            const updateVideoProgress = () => {
                if (active !== video || !video.duration) {
                    return
                }

                // Turn off CSS transitions because we are manually updating it 60fps
                progressBarFill.style.transition = 'none'

                const percentage = (video.currentTime / video.duration) * 100
                progressBarFill.style.width = `${percentage}%`

                // Keep looping as long as the video is playing
                if (!video.paused && !video.ended) {
                    videoProgressFrame = requestAnimationFrame(updateVideoProgress)
                }
            }

            // Start the loop when the video plays
            video.addEventListener('play', () => {
                progressBarContainer.style.display = 'block'
                if (videoProgressFrame) {
                    cancelAnimationFrame(videoProgressFrame)
                }
                videoProgressFrame = requestAnimationFrame(updateVideoProgress)
            })

            // Pause the loop when the video pauses
            video.addEventListener('pause', () => {
                if (videoProgressFrame) {
                    cancelAnimationFrame(videoProgressFrame)
                }
            })

            // Update the bar immediately if the user scrubs/seeks while paused
            video.addEventListener('seeked', () => {
                if (active === video && video.paused && video.duration) {
                    const percentage = (video.currentTime / video.duration) * 100
                    progressBarFill.style.width = `${percentage}%`
                }
            })

            playersContainer.appendChild(root)

            nextFile()

            playerCountText.innerText = playerCount.toString()

            if (playerCount > 1) {
                for (const element of document.querySelectorAll('.remove')) {
                    element.style.display = ''
                }
                for (const element of document.querySelectorAll('.remove-divider')) {
                    element.style.display = 'inline'
                }
            }

            updateLayout(true) // Animate new elements flowing in
        }

        function setQueueCountFromResponse(response) {
            const queueCount = response.headers.get('x-queue-count')
            // const queueSize = response.headers.get('x-queue-size')
            const videoCount = response.headers.get('x-queue-video-count')
            const imageCount = response.headers.get('x-queue-image-count')
            const audioCount = response.headers.get('x-queue-audio-count')

            queueCountText.innerText = `${queueCount} - ${videoCount} videos, ${imageCount} images, ${audioCount} audio`
        }

        async function getQueueInfo() {
            const response = await fetch('queue')
            setQueueCountFromResponse(response)
        }

        let queueInfoTimeout = null

        function getQueueInfoPoll(timeout = 1) {
            if (queueInfoTimeout !== null) {
                return
            }

            queueInfoTimeout = setTimeout(() => {
                getQueueInfo()
                    .catch(error => console.warn("Error getting queue info:", error))
                    .then(() => {
                        queueInfoTimeout = null
                        getQueueInfoPoll(500)
                    })
            }, timeout)


        }

        function updateLayout(animate = true) {
            const shouldAnimate = animate === true;

            const mode = layoutMode.value
            layoutCount.disabled = mode === 'fluid'

            let count = parseInt(layoutCount.value) || 1

            const domPlayers = Array.from(document.querySelectorAll('.root'))
            const N = domPlayers.length

            count = Math.min(count, N) || 1

            if (N === 0) return

            // --- 1. RECORD FIRST POSITIONS (For FLIP Animation) ---
            let firstRects;
            if (shouldAnimate) {
                firstRects = new Map();
                domPlayers.forEach(p => firstRects.set(p, p.getBoundingClientRect()));
            }

            // --- 2. APPLY LAYOUT MATH ---
            if (mode === 'fluid') {
                const rect = playersContainer.getBoundingClientRect();
                const W = rect.width || window.innerWidth;
                const H = rect.height || window.innerHeight;

                const players = [...domPlayers].sort((a, b) =>
                    (parseFloat(b.dataset.aspectRatio) || 1) - (parseFloat(a.dataset.aspectRatio) || 1)
                );

                let bestMinArea = -1;
                let bestTotalArea = -1;
                let bestPartition = null;
                let bestRowHeights = [];
                let bestTotalHeight = 0;

                const evaluate = (partition) => {
                    let totalH = 0;
                    let rHeights = [];
                    for (let row of partition) {
                        let sumR = row.reduce((s, p) => s + (parseFloat(p.dataset.aspectRatio) || 1), 0);
                        let rH = W / sumR;
                        rHeights.push(rH);
                        totalH += rH;
                    }

                    const mediaScale = Math.min(1, H / totalH);

                    let minArea = Infinity;
                    let totalArea = 0;

                    for (let i = 0; i < partition.length; i++) {
                        let scaledH = rHeights[i] * mediaScale;
                        for (let p of partition[i]) {
                            let r = parseFloat(p.dataset.aspectRatio) || 1;
                            let area = (scaledH * r) * scaledH;
                            if (area < minArea) minArea = area;
                            totalArea += area;
                        }
                    }

                    const EPSILON = 0.1;
                    if (minArea - bestMinArea > EPSILON || (Math.abs(minArea - bestMinArea) <= EPSILON && totalArea > bestTotalArea)) {
                        bestMinArea = minArea;
                        bestTotalArea = totalArea;
                        bestPartition = partition;
                        bestRowHeights = rHeights;
                        bestTotalHeight = totalH;
                    }
                };

                if (N <= 12) {
                    const getPartitions = (arr) => {
                        if (arr.length === 0) return [[]];
                        let res = [];
                        for (let i = 1; i <= arr.length; i++) {
                            let first = arr.slice(0, i);
                            let rests = getPartitions(arr.slice(i));
                            for (let r of rests) {
                                res.push([first, ...r]);
                            }
                        }
                        return res;
                    };
                    const allParts = getPartitions(players);
                    for (let part of allParts) {
                        evaluate(part);
                    }
                } else {
                    for (let c = 1; c <= N; c++) {
                        let part = [];
                        for (let i = 0; i < N; i += c) {
                            part.push(players.slice(i, i + c));
                        }
                        evaluate(part);
                    }
                }

                const scale = Math.min(1, H / bestTotalHeight);

                playersContainer.style.flexDirection = 'row';
                playersContainer.style.alignContent = 'flex-start';
                playersContainer.style.justifyContent = 'center';

                let orderCounter = 0;
                for (let i = 0; i < bestPartition.length; i++) {
                    const row = bestPartition[i];
                    const actualRowH = bestRowHeights[i] * scale;
                    const heightPct = (actualRowH / H) * 100;

                    for (let j = 0; j < row.length; j++) {
                        const player = row[j];
                        const ratio = parseFloat(player.dataset.aspectRatio) || 1;
                        const widthPct = ((actualRowH * ratio) / W) * 100;

                        player.style.flex = `0 0 calc(${widthPct}% - 0.01px)`;
                        player.style.height = `${heightPct}%`;
                        player.style.width = '';
                        player.style.order = orderCounter++;
                    }
                }
            } else {
                playersContainer.style.alignContent = 'stretch';
                playersContainer.style.justifyContent = 'flex-start';
                playersContainer.style.flexDirection = mode === 'horizontal' ? 'row' : 'column'

                const crossCount = Math.ceil(N / count) || 1

                for (let i = 0; i < N; i += count) {
                    const chunk = domPlayers.slice(i, i + count)

                    if (mode === 'horizontal') {
                        const totalRatio = chunk.reduce((sum, p) => sum + (parseFloat(p.dataset.aspectRatio) || 1), 0)

                        for (const player of chunk) {
                            const ratio = parseFloat(player.dataset.aspectRatio) || 1
                            const pct = (ratio / totalRatio) * 100

                            player.style.flex = `0 0 calc(${pct}% - 0.01px)`
                            player.style.width = ''
                            player.style.height = `calc(100% / ${crossCount})`
                            player.style.order = ''
                        }
                    } else {
                        const totalInvRatio = chunk.reduce((sum, p) => sum + (1 / (parseFloat(p.dataset.aspectRatio) || 1)), 0)

                        for (const player of chunk) {
                            const invRatio = 1 / (parseFloat(player.dataset.aspectRatio) || 1)
                            const pct = (invRatio / totalInvRatio) * 100

                            player.style.flex = `0 0 calc(${pct}% - 0.01px)`
                            player.style.height = ''
                            player.style.width = `calc(100% / ${crossCount})`
                            player.style.order = ''
                        }
                    }
                }
            }

            // --- 3. ANIMATE TO NEW POSITIONS ---
            if (shouldAnimate) {
                domPlayers.forEach(p => {
                    const first = firstRects.get(p);
                    const last = p.getBoundingClientRect();

                    const deltaX = first.left - last.left;
                    const deltaY = first.top - last.top;
                    const deltaW = first.width / (last.width || 1);
                    const deltaH = first.height / (last.height || 1);

                    // Only animate if the element actually moved or changed size
                    if (deltaX !== 0 || deltaY !== 0 || deltaW !== 1 || deltaH !== 1) {
                        p.animate([
                            { transformOrigin: 'top left', transform: `translate(${deltaX}px, ${deltaY}px) scale(${deltaW}, ${deltaH})` },
                            { transformOrigin: 'top left', transform: 'none' }
                        ], {
                            duration: 350,
                            easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)'
                        });
                    }
                });
            }
        }

        const patchRootsBody = []
        let patchRootsTimeout = null

        const rootCheckboxChanged = checkbox => {
            if (!checkbox.id.startsWith('root-')) {
                return
            }

            const root = checkbox.id.substring(5)
            patchRootsBody.push({path: root, enabled: checkbox.checked})

            if (patchRootsTimeout === null) {
                patchRootsTimeout = setTimeout(() => {
                    patchRootsTimeout = null
                    fetch('roots', {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(patchRootsBody.splice(0))
                    })
                        .then(response => setQueueCountFromResponse(response))
                        .catch(error => console.error('Error updating roots:', error))
                }, 100)
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            settingsManager.load()
            document.getElementById('options-modal').addEventListener('change', event => {
                const target = event.originalTarget || event.target
                if (target.type === 'checkbox' && target.id.startsWith('root-')) {
                    rootCheckboxChanged(target)
                    return
                }
                settingsManager.save()
            })

            queueCountText = document.querySelector('.queue-count')
            resetQueueButton = document.querySelector('.reset-queue')
            shuffleQueueButton = document.querySelector('.shuffle-queue')
            filterImage = document.querySelector('.filter-image')
            filterVideo = document.querySelector('.filter-video')
            filterAudio = document.querySelector('.filter-audio')

            playersContainer = document.querySelector('.players-container')

            playerCountText = document.querySelector('.player-count')
            addPlayerButton = document.querySelector('.add-player')

            layoutMode = document.querySelector('.layout-mode')
            layoutCount = document.querySelector('.layout-count')

            resetQueueButton.addEventListener('click', event => {
                event.preventDefault()
                fetch('reset').then(getQueueInfo)
            })

            shuffleQueueButton.addEventListener('click', event => {
                event.preventDefault()
                fetch('shuffle').then(getQueueInfo)
            })

            addPlayerButton.addEventListener('click', event => {
                event.preventDefault()
                addPlayer()
            })

            // Only trigger the animation on purposeful layout changes, NOT while continuously dragging the window size
            layoutMode.addEventListener('change', () => updateLayout(true));
            layoutCount.addEventListener('input', () => updateLayout(true));
            window.addEventListener('resize', () => updateLayout(false));

            const storagePlayerCount = Number(localStorage.getItem('zplay_player_count') || 0) || 1
            for (let i = 0; i < storagePlayerCount; i++) {
                addPlayer(false)
            }
            getQueueInfoPoll()

            // Fullscreen all trigger
            document.querySelector('.fullscreen-all-btn').addEventListener('click', event => {
                event.preventDefault()
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.error(err))
                } else {
                    document.exitFullscreen()
                }
            })

            // Pause other players when one goes fullscreen
            document.addEventListener('fullscreenchange', () => {
                const fsElement = document.fullscreenElement
                if (fsElement && fsElement.classList.contains('root')) {
                    document.querySelectorAll('.root').forEach(r => {
                        if (r !== fsElement && typeof r.pauseMedia === 'function') {
                            r.pauseMedia()
                        }
                    })
                }
            })

            // Modal Logic
            const modal = document.getElementById('options-modal')
            document.querySelector('.options-btn').addEventListener('click', async () => {
                try {
                    const roots = await fetch('roots').then(response => {
                        setQueueCountFromResponse(response)
                        return response.json()
                    })

                    const root = document.querySelector('.root-controls')
                    root.innerHTML = ''

                    const elements = []
                    for (const {path, enabled} of roots) {
                        const div = document.createElement('div')
                        div.innerHTML = `<label><input id="root-${path}" type="checkbox" ${enabled ? 'checked' : ''}> ${path}</label>`
                        const element = div.firstElementChild
                        element.onchange = rootCheckboxChanged.bind(null, element)
                        elements.push(element)
                    }
                    elements.sort((a, b) => a.innerText.localeCompare(b.innerText))
                    for (const element of elements) {
                        root.appendChild(element)
                    }
                } catch (error) {
                    console.error('Error fetching roots:', error)
                }
                modal.showModal()
            })
            document.querySelector('.close-modal').addEventListener('click', () => modal.close())

            // Playback Mutually Exclusive Checkboxes & Loop Display
            const autoSkipCheck = document.querySelector('.opt-autoskip')
            const loopCheck = document.querySelector('.opt-loop')

            autoSkipCheck.addEventListener('change', event => {
                if (event.target.checked) {
                    loopCheck.checked = false
                }
            })

            loopCheck.addEventListener('change', event => {
                if (event.target.checked) {
                    autoSkipCheck.checked = false
                }

                // Show/hide loop counts on active players instantly when toggled
                for (const element of document.querySelectorAll('.loop-info')) {
                    element.style.display = event.target.checked ? 'inline' : 'none'
                }
            })

            const imgDurationCheck = document.querySelector('.opt-img-duration-enabled')
            const imgDurationInput = document.querySelector('.opt-img-duration')

            imgDurationCheck.addEventListener('change', event => {
                imgDurationInput.disabled = !event.target.checked
            })

            const selectAllRoots = document.querySelector('.select-all-roots')
            const deselectAllRoots = document.querySelector('.deselect-all-roots')

            selectAllRoots.addEventListener('click', event => {
                event.preventDefault()
                for (const element of document.querySelectorAll('.root-controls input[type="checkbox"]')) {
                    element.checked = true
                    rootCheckboxChanged(element)
                }
            })
            deselectAllRoots.addEventListener('click', event => {
                event.preventDefault()
                for (const element of document.querySelectorAll('.root-controls input[type="checkbox"]')) {
                    element.checked = false
                    rootCheckboxChanged(element)
                }
            })
        })
    </script>
</head>
<body>
<div class="queue-header">
    <h3>Queue (<span class="queue-count"></span>) <a class="reset-queue" href="#">Reset queue</a> <a
            class="shuffle-queue" href="#">Shuffle queue</a></h3>
    <div>
        <button class="options-btn" style="width: auto; height: auto; padding: 5px 15px;">Options</button>
        <button class="fullscreen-all-btn" style="width: auto; height: auto; padding: 5px 15px;">Fullscreen All</button>
    </div>
    <h3>Players (<span class="player-count"></span>) <a class="add-player" href="#">Add Player</a></h3>
</div>

<dialog id="options-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin: 0; font-size: 1.2rem;">Options</h2>
            <button class="close-modal" style="width: auto; height: auto; padding: 5px 10px;">Close</button>
        </div>

        <fieldset class="modal-section">
            <legend>Filters</legend>
            <div class="filters">
                <label><input type="checkbox" class="filter-image" checked> Image</label>
                <label><input type="checkbox" class="filter-video" checked> Video</label>
                <label><input type="checkbox" class="filter-audio" checked> Audio</label>
            </div>
        </fieldset>

        <fieldset class="modal-section">
            <legend>Layout</legend>
            <div class="layout-controls">
                <label>Mode:
                    <select class="layout-mode">
                        <option value="horizontal">Columns</option>
                        <option value="vertical">Rows</option>
                        <option value="fluid">Fluid</option>
                    </select>
                </label>
                <label>Count: <input type="number" class="layout-count" value="3" min="1" max="10" style="width: 40px;"></label>
            </div>
        </fieldset>

        <fieldset class="modal-section">
            <legend>Playback</legend>
            <div class="playback-controls">
                <label><input type="checkbox" class="opt-autoplay" checked> Auto play</label>
                <label><input type="checkbox" class="opt-autoskip" checked> Auto skip</label>
                <label><input type="checkbox" class="opt-loop"> Loop</label>

                <div style="margin-top: 15px;">
                    <label style="margin-bottom: 5px;">
                        <input type="checkbox" class="opt-img-duration-enabled" checked> Auto-skip images after (s):
                    </label>
                    <input type="number" class="opt-img-duration" value="5" min="1"
                           style="width: 60px; margin-left: 24px;">
                </div>
            </div>
        </fieldset>

        <fieldset class="modal-section">
            <legend>Roots</legend>
            <a class="select-all-roots" href="#">Select All</a>
            <a class="deselect-all-roots" href="#">Deselect All</a>
            <div class="root-controls"></div>
        </fieldset>
    </div>
</dialog>

<div class="players-container"></div>
</body>
</html>
